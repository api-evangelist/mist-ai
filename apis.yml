  description: The Juniper Mist Cloud API is a comprehensive REST API exposing the entire Mist AI-driven enterprise
    networking platform — MSPs, Organizations, Sites, Access Points, Switches, SSRs/SRX gateways, WLANs, WxLANs,
    RFTemplates, NACTags, PSKs, Webhooks, Marvis, SLEs, Alarms, Locations, Maps, Zones, Beacons, Assets, Clients,
    Guests, Inventory, Licenses, PCAPs, Stats, Insights, RRM, and Constants. 736 paths, 2832 schemas, 209 tag
    groups. Three authentication schemes (API token, basic auth, CSRF token) and 13 regional cloud endpoints
    spanning Global, EMEA, APAC. Versioning uses AABB.C.D (year/month/release/patch); current 2604.1.1.
- aid: mist-ai:juniper-mist-websocket-streaming
