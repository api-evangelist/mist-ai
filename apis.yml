description: Juniper Mist AI is the AI-driven enterprise networking platform that powers Juniper Networks'
  AI-Native Networking portfolio. Acquired by Juniper Networks in 2019, Mist pioneered cloud-native, microservices
  Wi-Fi and extended its AIOps approach across Wired Assurance (EX/QFX switches), WAN Assurance (SSR/SRX gateways),
  and Access Assurance (cloud NAC). The platform is anchored by Marvis — a conversational virtual network
  assistant — and the Mist Cloud API, an OpenAPI 3.1 surface of 736 paths and 2832 schemas served across 13
  regional clouds (Global, EMEA, APAC, Federal). Real-time event flow ships over WebSocket subscriptions and
  outbound Webhooks; infrastructure-as-code is supported by an official Terraform provider; and indoor location
  is delivered through Virtual BLE with native iOS and Android SDKs.
