  description: Mist Webhooks deliver outbound HTTP POST notifications for events at the Organization or Site
    scope. Supported topics include audits, alarms, device events, client join/disconnect/sessions, Zone enter/exit
    (location), occupancy, RSSI/SDK clients, and Marvis Actions. Webhooks can be configured per-topic with HTTPS
    targets and optional secret for signature verification.
